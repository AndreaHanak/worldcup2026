*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--navy);color:#fff;min-height:100vh;}
.hero{background:linear-gradient(160deg,var(--navy) 0%,#0D1F42 60%,var(--navy-light) 100%);padding:48px 24px 40px;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid rgba(201,168,76,0.2);}
.hero::before{content:'';position:absolute;top:-100px;right:-100px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);pointer-events:none;}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
.hero-flags{display:flex;justify-content:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.hero-flags span{font-size:26px;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,10vw,96px);line-height:0.85;letter-spacing:0.02em;margin-bottom:6px;}
.hero-title .gold{color:var(--gold);}
.hero-sub{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,4vw,32px);letter-spacing:0.1em;color:rgba(255,255,255,0.45);margin-bottom:24px;}
.hero-rule{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 24px;}
.hero-family{display:inline-flex;align-items:center;gap:12px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.3);border-radius:40px;padding:10px 28px;font-size:18px;color:var(--gold-light);font-style:italic;font-family:Georgia,serif;margin-bottom:32px;}
.scoring-pills{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}
.pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:30px;padding:7px 16px;font-size:12px;font-weight:500;color:rgba(255,255,255,0.7);}
.pill .pts{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);line-height:1;}
.sync-bar{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06);padding:7px 20px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:11px;color:rgba(255,255,255,0.35);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#6B7280;flex-shrink:0;transition:background 0.3s;}
.sync-dot.live{background:#22C55E;box-shadow:0 0 6px #22C55E;animation:pulse 2s infinite;}
.sync-dot.error{background:#EF4444;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.player-bar{background:var(--navy-mid);border-bottom:1px solid rgba(201,168,76,0.15);padding:16px 24px;position:sticky;top:0;z-index:100;}
.player-bar-label{font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;text-align:center;}
.player-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.player-chip{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.04);cursor:pointer;transition:all 0.18s;font-size:13px;font-weight:600;color:rgba(255,255,255,0.65);white-space:nowrap;user-select:none;}
.player-chip:hover{border-color:var(--gold-dim);background:rgba(201,168,76,0.08);color:#fff;}
.player-chip.active{border-color:var(--gold);background:rgba(201,168,76,0.15);color:#fff;box-shadow:0 0 0 1px rgba(201,168,76,0.3);}
.chip-emoji{font-size:16px;}
.tabs{display:flex;background:var(--navy-mid);border-bottom:1px solid rgba(255,255,255,0.08);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:71px;z-index:99;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:13px 20px;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.45);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;flex-shrink:0;user-select:none;}
.tab:hover{color:rgba(255,255,255,0.8);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.main{max-width:860px;margin:0 auto;padding:24px 16px 60px;}
.leaderboard{background:var(--navy-card);border:1px solid rgba(201,168,76,0.2);border-radius:14px;overflow:hidden;margin-bottom:28px;}
.lb-header{background:linear-gradient(90deg,rgba(201,168,76,0.15),rgba(201,168,76,0.05));border-bottom:1px solid rgba(201,168,76,0.2);padding:14px 20px;display:flex;align-items:center;gap:10px;}
.lb-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.06em;color:var(--gold-light);flex:1;}
.lb-updated{font-size:10px;color:rgba(255,255,255,0.3);}
.lb-row{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.05);gap:14px;transition:background 0.15s;}
.lb-row:last-child{border-bottom:none;}
.lb-row.first{background:rgba(201,168,76,0.06);}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold-dim);width:28px;text-align:center;flex-shrink:0;}
.lb-row.first .lb-rank{color:var(--gold);font-size:28px;}
.lb-emoji{font-size:20px;flex-shrink:0;}
.lb-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.04em;flex:1;}
.lb-row.first .lb-name{color:var(--gold-light);font-size:26px;}
.lb-breakdown{display:flex;gap:5px;align-items:center;}
.lb-stage-pts{font-size:9px;color:rgba(255,255,255,0.35);text-align:center;min-width:30px;}
.lb-stage-pts .sval{display:block;font-size:13px;font-weight:700;color:rgba(255,255,255,0.7);}
.lb-total{font-family:'Bebas Neue',sans-serif;font-size:32px;color:#fff;min-width:48px;text-align:right;}
.lb-row.first .lb-total{color:var(--gold);font-size:38px;}
.stage-header{display:flex;align-items:center;gap:12px;margin:28px 0 14px;}
.stage-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.08em;color:var(--gold);white-space:nowrap;}
.stage-line{flex:1;height:1px;background:rgba(201,168,76,0.2);}
.match-card{background:var(--navy-card);border:1px solid rgba(255,255,255,0.08);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.match-card.final-match{border-color:var(--gold-dim);box-shadow:0 0 20px rgba(201,168,76,0.1);}
.card-top{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.card-label{font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);white-space:nowrap;}
.card-meta{font-size:10px;color:rgba(255,255,255,0.35);text-align:right;}
.card-body{padding:14px 16px;}
.teams-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.team-block{flex:1;display:flex;align-items:center;gap:8px;}
.team-block.right{flex-direction:row-reverse;text-align:right;}
.team-flag{font-size:24px;line-height:1;}
.final-match .team-flag{font-size:30px;}
.team-info{flex:1;}
.team-name{font-size:15px;font-weight:700;color:#fff;line-height:1.2;}
.final-match .team-name{font-size:18px;color:var(--gold-light);}
.team-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.vs-circle{background:var(--navy-light);border:1px solid rgba(201,168,76,0.3);color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:14px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.final-match .vs-circle{width:40px;height:40px;font-size:18px;background:linear-gradient(135deg,var(--gold-dim),var(--navy-light));border-color:var(--gold);}

.pred-label{font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pred-input-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.score-inputs{display:flex;align-items:center;gap:6px;}

.score-input::-webkit-inner-spin-button,.score-input::-webkit-outer-spin-button{-webkit-appearance:none;}

.score-sep{font-size:22px;font-weight:700;color:rgba(255,255,255,0.3);line-height:1;}
.save-btn{margin-left:8px;padding:10px 18px;background:var(--gold);color:var(--navy);border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.save-btn:hover{background:var(--gold-light);}
.save-btn.saved{background:var(--green);color:#fff;}

.result-score{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;line-height:1;}
.result-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-exact{background:rgba(201,168,76,0.2);border:1px solid rgba(201,168,76,0.4);color:var(--gold-light);}
.badge-winner{background:rgba(26,107,58,0.2);border:1px solid rgba(26,107,58,0.4);color:#4ADE80;}

.psc-score{font-family:'Bebas Neue',sans-serif;font-size:16px;color:rgba(255,255,255,0.75);flex:1;text-align:right;}
.psc-pts{font-size:10px;font-weight:700;padding:2px 5px;border-radius:10px;}
.psc-pts.exact{background:rgba(201,168,76,0.2);color:var(--gold-light);}
.psc-pts.winner{background:rgba(26,107,58,0.2);color:#4ADE80;}
.psc-pts.wrong{background:rgba(185,28,28,0.15);color:#FCA5A5;}

.admin-btn:hover{background:rgba(201,168,76,0.15);}

.loading{text-align:center;padding:60px 24px;}
.spinner{width:36px;height:36px;border:3px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading p{font-size:13px;color:rgba(255,255,255,0.4);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:12px 24px;border-radius:40px;font-size:14px;font-weight:600;transition:transform 0.3s;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.4);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red);}
@media(max-width:600px){.lb-breakdown{display:none;}.all-preds{grid-template-columns:repeat(2,1fr);}.save-btn{width:100%;margin-left:0;margin-top:8px;}}

</head>

let activePlayer = null;
let activeStage = 'leaderboard';
let predictions = {};
let results = {};
let isLoaded = false;

// SUPABASE
async function loadAll() {
try {
const [pr, rr] = await Promise.all([
db.from('predictions').select('*'),
db.from('results').select('*'),
]);
if (pr.error) throw pr.error;
if (rr.error) throw rr.error;
predictions = {};
pr.data.forEach(r => { predictions[r.player + '_' + r.match_id] = { home: r.home_score, away: r.away_score }; });
results = {};
rr.data.forEach(r => { results[r.match_id] = { home: r.home_score, away: r.away_score }; });
isLoaded = true;
setSyncStatus('live', 'Live - syncing in real time');
renderMain();
} catch(e) {
setSyncStatus('error', 'Connection error - retrying...');
setTimeout(loadAll, 4000);
}
}

function subscribeRealtime() {
db.channel('wc2026_live')
.on('postgres_changes', { event: '*', schema: 'public', table: 'predictions' }, payload => {
const r = payload.new;
if (r && r.player) predictions[r.player + '_' + r.match_id] = { home: r.home_score, away: r.away_score };
renderMain();
})
.on('postgres_changes', { event: '*', schema: 'public', table: 'results' }, payload => {
const r = payload.new;
if (r && r.match_id) results[r.match_id] = { home: r.home_score, away: r.away_score };
renderMain();
})
.subscribe(status => {
if (status === 'SUBSCRIBED') setSyncStatus('live', 'Live - syncing in real time');
if (status === 'CLOSED' || status === 'CHANNEL_ERROR') setSyncStatus('error', 'Reconnecting...');
});
}

async function savePrediction(matchId, home, away) {
const key = activePlayer + '_' + matchId;
predictions[key] = { home, away };
const { error } = await db.from('predictions').upsert(
{ id: key, player: activePlayer, match_id: matchId, home_score: home, away_score: away, updated_at: new Date().toISOString() },
{ onConflict: 'id' }
);
if (error) { showToast('Save failed - check connection', true); return false; }
return true;
}

async function saveResultToDB(matchId, home, away) {
results[matchId] = { home, away };
const { error } = await db.from('results').upsert(
{ match_id: matchId, home_score: home, away_score: away, updated_at: new Date().toISOString() },
{ onConflict: 'match_id' }
);
if (error) { showToast('Save failed - check connection', true); return false; }
return true;
}

// HELPERS
function getPred(pid, mid) { return predictions[pid + '_' + mid] || null; }
function getRes(mid) { return results[mid] || null; }

function calcPoints(pred, result) {
if (!pred || !result) return null;
if (pred.home == null || pred.away == null) return null;
const ph = parseInt(pred.home), pa = parseInt(pred.away);
const rh = parseInt(result.home), ra = parseInt(result.away);
if (isNaN(ph) || isNaN(pa) || isNaN(rh) || isNaN(ra)) return null;
if (ph === rh && pa === ra) return 3;
const pw = ph > pa ? 'h' : pa > ph ? 'a' : 'd';
const rw = rh > ra ? 'h' : ra > rh ? 'a' : 'd';
return pw === rw ? 1 : 0;
}

function getPlayerTotals() {
return PLAYERS.map(p => {
let total = 0, grp = 0, r32 = 0, r16 = 0, qf = 0, sf = 0, fin = 0;
MATCHES.forEach(m => {
const pts = calcPoints(getPred(p.id, m.id), getRes(m.id));
if (pts !== null) {
total += pts;
if (m.stage === 'group') grp += pts;
if (m.stage === 'r32') r32 += pts;
if (m.stage === 'r16') r16 += pts;
if (m.stage === 'qf') qf += pts;
if (m.stage === 'sf') sf += pts;
if (m.stage === 'final') fin += pts;
}
});
return { ...p, total, grp, r32, r16, qf, sf, fin };
}).sort((a, b) => b.total - a.total);
}

function setSyncStatus(state, label) {
const dot = document.getElementById('syncDot');
const lbl = document.getElementById('syncLabel');
if (dot) dot.className = 'sync-dot ' + state;
if (lbl) lbl.textContent = label;
}

function showToast(msg, isError) {
const t = document.getElementById('toast');
if (!t) return;
t.textContent = msg;
t.className = 'toast' + (isError ? ' error' : '') + ' show';
setTimeout(() => { t.className = 'toast' + (isError ? ' error' : ''); }, 2400);
}

function clampInput(el) {
const v = parseInt(el.value);
if (isNaN(v) || v < 0) el.value = '';
else if (v > 20) el.value = 20;
}

// RENDER
function renderPlayerChips() {
const el = document.getElementById('playerChips');
if (!el) return;
el.innerHTML = PLAYERS.map(p =>
'<div class="player-chip ' + (activePlayer === p.id ? 'active' : '') + '" data-player="' + p.id + '">' +
'<span class="chip-emoji">' + p.emoji + '</span> ' + p.name + '</div>'
).join('');
el.querySelectorAll('.player-chip').forEach(chip => {
chip.addEventListener('click', function() { selectPlayer(this.dataset.player); });
});
}

function renderTabs() {
const el = document.getElementById('tabs');
if (!el) return;
el.innerHTML = STAGES.map(s =>
'<div class="tab ' + (activeStage === s.id ? 'active' : '') + '" data-stage="' + s.id + '">' + s.label + '</div>'
).join('');
el.querySelectorAll('.tab').forEach(tab => {
tab.addEventListener('click', function() { selectStage(this.dataset.stage); });
});
}

function attachCardListeners(matches) {
matches.forEach(m => {
const btn = document.getElementById('btn_' + m.id);
if (btn) btn.addEventListener('click', function() { handleSavePred(m.id); });
const abtn = document.getElementById('abtn_' + m.id);
if (abtn) abtn.addEventListener('click', function() { handleSaveResult(m.id); });
});
}

function renderMain() {
if (!isLoaded) return;
const el = document.getElementById('main');
if (!el) return;

if (activeStage === 'leaderboard') { el.innerHTML = renderLeaderboard(); return; }

if (!activePlayer) {
el.innerHTML = '<div class="select-prompt"><div class="icon">👆</div><h2>Select your name above</h2><p>Tap your name to enter your score predictions.</p></div>';
return;
}

const matches = MATCHES.filter(m => m.stage === activeStage);

if (activeStage === 'group') {
const groups = [];
matches.forEach(m => { if (groups.indexOf(m.group) === -1) groups.push(m.group); });
let html = '<div class="stage-intro">All 72 group matches. Scroll through every group and lock in your scores.</div>';
groups.forEach(g => {
html += '<div class="stage-header"><div class="stage-title">Group ' + g + '</div><div class="stage-line"></div></div>';
html += matches.filter(m => m.group === g).map(renderMatchCard).join('');
});
el.innerHTML = html;
} else {
el.innerHTML = matches.map(renderMatchCard).join('');
}

attachCardListeners(matches);
}

function renderLeaderboard() {
const totals = getPlayerTotals();
const hasPoints = totals.some(p => p.total > 0);
let html = '<div class="leaderboard"><div class="lb-header"><div class="lb-title">🏆 Live Leaderboard</div><div class="lb-updated">Updates in real time</div></div>';
totals.forEach((p, i) => {
html += '<div class="lb-row ' + (i === 0 && hasPoints ? 'first' : '') + '">' +
'<div class="lb-rank">' + (i + 1) + '</div>' +
'<div class="lb-emoji">' + p.emoji + '</div>' +
'<div class="lb-name">' + p.name + '</div>' +
'<div class="lb-breakdown">' +
'<div class="lb-stage-pts"><span class="sval">' + p.grp + '</span>GRP</div>' +
'<div class="lb-stage-pts"><span class="sval">' + p.r32 + '</span>R32</div>' +
'<div class="lb-stage-pts"><span class="sval">' + p.r16 + '</span>R16</div>' +
'<div class="lb-stage-pts"><span class="sval">' + p.qf + '</span>QF</div>' +
'<div class="lb-stage-pts"><span class="sval">' + p.sf + '</span>SF</div>' +
'<div class="lb-stage-pts"><span class="sval">' + p.fin + '</span>FIN</div>' +
'</div>' +
'<div class="lb-total">' + p.total + '</div></div>';
});
html += '</div><div style="text-align:center;padding:12px 0 8px;"><div style="font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:0.1em;text-transform:uppercase;">3 pts exact · 1 pt correct result · Andrea enters results after each match</div></div>';
return html;
}

function renderMatchCard(m) {
const pred = activePlayer ? getPred(activePlayer, m.id) : null;
const result = getRes(m.id);
const pts = calcPoints(pred, result);

let badge = '';
if (pts === 3) badge = '<span class="result-badge badge-exact">⭐ 3 pts - Exact!</span>';
else if (pts === 1) badge = '<span class="result-badge badge-winner">✓ 1 pt - Correct Result</span>';
else if (pts === 0) badge = '<span class="result-badge badge-wrong">✗ 0 pts</span>';

let allPreds = '';
PLAYERS.forEach(p => {
const pp = getPred(p.id, m.id);
const ppts = calcPoints(pp, result);
const sc = pp != null ? (pp.home + '-' + pp.away) : '-';
let cls = '', lbl = '';
if (ppts === 3) { cls = 'exact'; lbl = '3pt'; }
else if (ppts === 1) { cls = 'winner'; lbl = '1pt'; }
else if (ppts === 0) { cls = 'wrong'; lbl = '0pt'; }
allPreds += '<div class="pred-summary-card">' +
'<div class="psc-name">' + p.emoji + ' ' + p.name + '</div>' +
'<div class="psc-score">' + sc + '</div>' +
(lbl ? '<div class="psc-pts ' + cls + '">' + lbl + '</div>' : '') +
'</div>';
});

const isAdmin = activePlayer === 'andrea';
const hVal = pred != null ? pred.home : '';
const aVal = pred != null ? pred.away : '';
const rHVal = result != null ? result.home : '';
const rAVal = result != null ? result.away : '';

let html = '<div class="match-card ' + (m.isFinal ? 'final-match' : '') + '">';
html += '<div class="card-top"><div class="card-label">' + m.label + '</div><div class="card-meta">' + m.date + ' · ' + m.time + ' · ' + m.venue + '</div></div>';
html += '<div class="card-body">';
html += '<div class="teams-row">' +
'<div class="team-block"><span class="team-flag">' + m.homeFlag + '</span><div class="team-info"><div class="team-name">' + m.home + '</div>' + (m.homeSub ? '<div class="team-sub">' + m.homeSub + '</div>' : '') + '</div></div>' +
'<div class="vs-circle">VS</div>' +
'<div class="team-block right"><span class="team-flag">' + m.awayFlag + '</span><div class="team-info"><div class="team-name">' + m.away + '</div>' + (m.awaySub ? '<div class="team-sub">' + m.awaySub + '</div>' : '') + '</div></div>' +
'</div>';

if (activePlayer) {
html += '<div class="prediction-zone">' +
'<div class="pred-label">' + PLAYERS.find(p => p.id === activePlayer).emoji + ' Your Prediction ' + badge + '</div>' +
'<div class="pred-input-row"><div class="score-inputs">' +
'<input type="number" min="0" max="20" class="score-input ' + (result ? 'locked' : '') + '" id="inp_' + m.id + '_h" value="' + hVal + '" placeholder="0"' + (result ? ' disabled' : '') + ' oninput="clampInput(this)">' +
'<span class="score-sep">-</span>' +
'<input type="number" min="0" max="20" class="score-input ' + (result ? 'locked' : '') + '" id="inp_' + m.id + '_a" value="' + aVal + '" placeholder="0"' + (result ? ' disabled' : '') + ' oninput="clampInput(this)">' +
'</div>';
if (!result) {
html += '<button class="save-btn" id="btn_' + m.id + '">Save</button>';
} else {
html += '<div class="result-display"><div class="result-score">Result: ' + result.home + ' - ' + result.away + '</div></div>';
}
html += '</div></div>';
}

html += '<div class="all-preds-title">Everyone\'s picks</div><div class="all-preds">' + allPreds + '</div>';

if (isAdmin) {
html += '<div class="result-admin">' +
'<div class="result-admin-label">📋 Enter Final Score</div>' +
'<input type="number" min="0" max="20" class="admin-input" id="res_' + m.id + '_h" value="' + rHVal + '" placeholder="0" oninput="clampInput(this)">' +
'<span class="score-sep" style="font-size:16px;">-</span>' +
'<input type="number" min="0" max="20" class="admin-input" id="res_' + m.id + '_a" value="' + rAVal + '" placeholder="0" oninput="clampInput(this)">' +
'<button class="admin-btn" id="abtn_' + m.id + '">Set Result</button>' +
'</div>';
}

html += '</div></div>';
return html;
}

// ACTIONS
function selectPlayer(id) {
activePlayer = activePlayer === id ? null : id;
renderPlayerChips();
if (activePlayer && activeStage === 'leaderboard') {
activeStage = 'group';
renderTabs();
}
renderMain();
}

function selectStage(id) {
activeStage = id;
renderTabs();
renderMain();
window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function handleSavePred(matchId) {
if (!activePlayer) return;
const h = document.getElementById('inp_' + matchId + '_h');
const a = document.getElementById('inp_' + matchId + '_a');
if (!h || !a || h.value === '' || a.value === '') { showToast('Enter both scores first', true); return; }
const btn = document.getElementById('btn_' + matchId);
if (btn) { btn.textContent = 'Saving...'; btn.disabled = true; }
const ok = await savePrediction(matchId, parseInt(h.value), parseInt(a.value));
if (ok) { showToast('✓ Prediction saved!'); renderMain(); }
else if (btn) { btn.textContent = 'Save'; btn.disabled = false; }
}

async function handleSaveResult(matchId) {
const h = document.getElementById('res_' + matchId + '_h');
const a = document.getElementById('res_' + matchId + '_a');
if (!h || !a || h.value === '' || a.value === '') { showToast('Enter both result scores', true); return; }
const ok = await saveResultToDB(matchId, parseInt(h.value), parseInt(a.value));
if (ok) { showToast('✓ Result saved - points updated for everyone!'); renderMain(); }
}


// AUTO SCORE SYNC (TheSportsDB, free public data)
const SCORES_ENABLED = true;
const SCORES_ROUNDS = [1,2,3];
const SCORES_API = 'https://www.thesportsdb.com/api/v1/json/123/eventsround.php?id=4429&s=2026&r=';
const API_ALIAS = { 'Bosnia-Herzegovina':'Bosnia', 'Curacao':'Curacao', 'Czech Republic':'Czechia', 'DR Congo':'DRC', 'Turkey':'Turkiye' };
const FINISHED_STATUS = ['FT','AET','AP','PEN','FT_PEN','Match Finished','After Extra Time','After Penalties'];

function normTeam(n){ if(!n) return ''; n=String(n).trim(); return API_ALIAS[n] || n; }
function teamKey(n){ return normTeam(n).toLowerCase().normalize('NFD').replace(/[^a-z]/g,''); }
function pairKey(a,b){ return [teamKey(a),teamKey(b)].sort().join('|'); }
function isFinishedEvent(e){
if(e.intHomeScore==null || e.intAwayScore==null) return false;
if(FINISHED_STATUS.indexOf(e.strStatus)!==-1) return true;
if(e.strTimestamp){ const ko=new Date(e.strTimestamp+'Z').getTime(); if(!isNaN(ko) && Date.now() > ko + 150*60000) return true; }
return false;
}

async function syncScores(){
if(!SCORES_ENABLED || !isLoaded) return;
let events = [];
for(const r of SCORES_ROUNDS){
try{ const j = await fetch(SCORES_API + r).then(x=>x.json()); if(j && j.events) events = events.concat(j.events); }catch(e){}
}
if(!events.length) return;
const byPair = {};
MATCHES.forEach(m => { if(m.home!=='TBD' && m.away!=='TBD') byPair[pairKey(m.home,m.away)] = m; });
let updated = 0;
for(const e of events){
if(!isFinishedEvent(e)) continue;
const hs = parseInt(e.intHomeScore), as = parseInt(e.intAwayScore);
if(isNaN(hs) || isNaN(as)) continue;
const m = byPair[pairKey(e.strHomeTeam, e.strAwayTeam)];
if(!m) continue;
let myH, myA;
if(teamKey(m.home) === teamKey(e.strHomeTeam)){ myH = hs; myA = as; } else { myH = as; myA = hs; }
const ex = getRes(m.id);
if(ex && parseInt(ex.home)===myH && parseInt(ex.away)===myA) continue;
const ok = await saveResultToDB(m.id, myH, myA);
if(ok) updated++;
}
if(updated > 0) renderMain();
}

// INIT
document.addEventListener('DOMContentLoaded', function() {
renderPlayerChips();
renderTabs();
loadAll().then(() => { subscribeRealtime(); syncScores(); setInterval(syncScores, 120000); });
});
